workflows:
  ios-selfsigned:
    name: iOS SelfSigned
    environment:
      flutter: stable
    scripts:
      - flutter pub get
      - flutter build ios --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      - internal
    code_signing:
      provisioning_profile_path: ios/Runner/MyProfile.mobileprovision
      certificate_path: ios/Runner/MyCert.p12
      certificate_passphrase: $CERT_PASSWORD