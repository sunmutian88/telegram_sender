workflows:
  ios_web_only:
    name: iOS & Web Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get Dependencies
        script: flutter pub get
      - name: iOS Build
        script: flutter build ios --release
      - name: Web Build
        script: flutter build web --release
    artifacts:
      - build/ios/iphoneos/Runner.app
      - build/web/**