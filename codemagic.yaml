workflows:
  telegram_sender_workflow:
    name: Telegram Sender Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      java: openjdk17
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Build Android
        script: |
          flutter build apk --debug
      - name: Build iOS
        script: |
          flutter build ios --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
      - build/ios/iphoneos/Runner.app